<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>ERLİK — El Takip Testi</title>
<style>
  :root{--mid:#ff8c1e; --dim:#8a7f72; --line:#2a2118; --card:#14120f}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#08070a;color:#eee;font-family:-apple-system,Roboto,sans-serif;overflow:hidden}
  #sahne{position:fixed;inset:0;background:#000}
  video,canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;
    transform:scaleX(-1)}                      /* ayna */
  #panel{position:fixed;top:10px;left:10px;z-index:10;background:rgba(0,0,0,.62);
    border:1px solid var(--line);border-radius:12px;padding:10px 13px;font-size:13px;line-height:1.7;
    backdrop-filter:blur(6px);min-width:170px}
  #panel b{color:var(--mid);font-size:20px}
  .sat{display:flex;justify-content:space-between;gap:14px}
  .sat span:first-child{color:var(--dim)}
  #hareket{position:fixed;top:10px;right:10px;z-index:10;background:rgba(0,0,0,.62);
    border:1px solid var(--line);border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;color:var(--mid)}
  #basla{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;background:#08070a;padding:26px;text-align:center}
  #basla h1{color:var(--mid);margin:0;font-size:22px;letter-spacing:2px}
  #basla p{color:var(--dim);font-size:14px;line-height:1.6;margin:0;max-width:380px}
  #basla button{background:var(--mid);color:#000;border:none;padding:15px 30px;border-radius:26px;
    font-size:16px;font-weight:700}
  #durum{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;
    background:rgba(0,0,0,.62);border:1px solid var(--line);border-radius:20px;padding:8px 16px;
    font-size:12px;color:var(--dim);max-width:92%;text-align:center}
</style>
</head>
<body>

<div id="sahne">
  <video id="vid" playsinline muted></video>
  <canvas id="ciz"></canvas>
</div>

<div id="panel">
  <div class="sat"><span>FPS</span><b id="fps">—</b></div>
  <div class="sat"><span>İşlem</span><span id="sure">— ms</span></div>
  <div class="sat"><span>El</span><span id="elVar">yok</span></div>
  <div class="sat"><span>Çözünürlük</span><span id="coz">—</span></div>
</div>

<div id="hareket">—</div>
<div id="durum">Model iniyor…</div>

<div id="basla">
  <h1>EL TAKİP TESTİ</h1>
  <p>Kamera açılacak, elini takip edecek ve köşede <b>FPS</b> gösterecek.<br><br>
     Bu rakam ERLİK'te hangi oyunların çalışabileceğini belirleyecek:<br>
     <b>25+</b> → her şey olur &nbsp;·&nbsp; <b>15-25</b> → koşu oyunu &nbsp;·&nbsp; <b>&lt;15</b> → sadece basit el işaretleri</p>
  <button id="btn">KAMERAYI AÇ</button>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const vid=document.getElementById('vid'), ciz=document.getElementById('ciz'), ctx=ciz.getContext('2d');
const fpsEl=document.getElementById('fps'), sureEl=document.getElementById('sure');
const elVarEl=document.getElementById('elVar'), cozEl=document.getElementById('coz');
const hareketEl=document.getElementById('hareket'), durumEl=document.getElementById('durum');

let el=null, sonZaman=-1, kareler=[], sureler=[];

document.getElementById('btn').onclick=async()=>{
  document.getElementById('basla').style.display='none';
  try{ await modelKur(); await kameraAc(); dongu(); }
  catch(e){ durumEl.innerText='⚠ '+e.message; }
};

async function modelKur(){
  durumEl.innerText='Model iniyor… (ilk sefer ~8 MB)';
  const dosya=await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  el=await HandLandmarker.createFromOptions(dosya,{
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate:"GPU"                       // eski telefonda GPU yoksa CPU'ya düşer
    },
    runningMode:"VIDEO",
    numHands:1
  });
  durumEl.innerText='Model hazır. Kamera açılıyor…';
}

async function kameraAc(){
  const akis=await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} }, audio:false });
  vid.srcObject=akis;
  await vid.play();
  ciz.width=vid.videoWidth; ciz.height=vid.videoHeight;
  cozEl.innerText=vid.videoWidth+'×'+vid.videoHeight;
  durumEl.innerText='Elini kameraya göster';
}

function dongu(){
  const simdi=performance.now();
  if(vid.currentTime!==sonZaman){
    sonZaman=vid.currentTime;
    const t0=performance.now();
    let sonuc=null;
    try{ sonuc=el.detectForVideo(vid, simdi); }catch(e){}
    const t1=performance.now();

    sureler.push(t1-t0); if(sureler.length>30) sureler.shift();
    kareler.push(simdi);  while(kareler.length && simdi-kareler[0]>1000) kareler.shift();
    fpsEl.innerText=kareler.length;
    sureEl.innerText=Math.round(sureler.reduce((a,b)=>a+b,0)/sureler.length)+' ms';

    ctx.clearRect(0,0,ciz.width,ciz.height);
    if(sonuc && sonuc.landmarks && sonuc.landmarks.length){
      elVarEl.innerText='VAR';
      const n=sonuc.landmarks[0];
      elCiz(n);
      hareketEl.innerText=hareketBul(n);
    } else {
      elVarEl.innerText='yok';
      hareketEl.innerText='—';
    }
  }
  requestAnimationFrame(dongu);
}

const BAG=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
           [9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
function elCiz(n){
  const G=ciz.width, Y=ciz.height;
  ctx.strokeStyle='rgba(255,140,30,.85)'; ctx.lineWidth=3;
  BAG.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo(n[a].x*G, n[a].y*Y);
    ctx.lineTo(n[b].x*G, n[b].y*Y);
    ctx.stroke();
  });
  n.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x*G, p.y*Y, i===8?9:5, 0, 7);
    ctx.fillStyle = i===8 ? '#fff' : 'rgba(255,200,120,.9)';
    ctx.fill();
  });
}

// kaba hareket tanıma: parmak açık mı kapalı mı
function hareketBul(n){
  const uc=[8,12,16,20], dip=[6,10,14,18];
  let acik=0;
  for(let i=0;i<4;i++) if(n[uc[i]].y < n[dip[i]].y) acik++;
  const basAcik = Math.abs(n[4].x-n[17].x) > Math.abs(n[5].x-n[17].x)*0.6;
  if(acik===0) return '✊ YUMRUK';
  if(acik===4) return basAcik ? '🖐 AÇIK EL' : '✋ KAĞIT';
  if(acik===1 && n[8].y<n[6].y) return '☝ İŞARET';
  if(acik===2) return '✌ MAKAS';
  return acik+' parmak';
}
</script>
</body>
</html>
